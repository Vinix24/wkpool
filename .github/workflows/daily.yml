name: Daily predictions

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC, after the results dataset updates
  workflow_dispatch: {}     # manual trigger for the last-minute re-run

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            wkpool daily --force --with-news
          else
            wkpool daily --force
          fi

      - name: Commit predictions
        run: |
          git config user.name "wkpool-bot"
          git config user.email "actions@users.noreply.github.com"
          git add PREDICTIONS.md
          git diff --cached --quiet || git commit -m "Daily predictions $(date -u +%F)"
          git push
